<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>פרשות השבוע בסגנון 2048</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Frank+Ruhl+Libre:wght@500;700;900&family=Heebo:wght@400;500;700;800&family=Suez+One&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='6' y='6' width='52' height='52' rx='10' fill='%23c4632e' stroke='%233a2a16' stroke-width='4'/%3E%3Ctext x='32' y='44' font-size='34' text-anchor='middle' fill='%23f4cd7e' font-family='serif' font-weight='bold'%3E%D7%90%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --serif: 'Frank Ruhl Libre', 'David Libre', 'Times New Roman', serif;
    --display: 'Suez One', 'Frank Ruhl Libre', 'David Libre', serif;
    --sans: 'Heebo', system-ui, -apple-system, 'Segoe UI', sans-serif;

    --ink:#3a2a16;
    --ink-soft:#5a4326;
    --board-bg:#8a653c;
    --well:#9c7448;
    --line:rgba(58,40,12,.18);

    --size: min(92vw, 460px);
    --gap: clamp(8px, 2.6vw, 14px);
    --cell: calc((var(--size) - 5 * var(--gap)) / 4);
    --stride: calc(var(--cell) + var(--gap));
    --slide: 130ms;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    font-family:var(--sans);
    color:var(--ink);
    min-height:100dvh;
    background: linear-gradient(180deg,#d9b88a,#b98e5e 60%,#9c6f43);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:max(18px, env(safe-area-inset-top)) 16px 28px;
    -webkit-tap-highlight-color:transparent;
    overflow-x:hidden;
  }

  .wrap{ width:var(--size); max-width:100%; }

  /* ---------- menu screen (desert title screen) ---------- */
  [hidden]{display:none !important}

  /* Override body background for menu — body has sandy gradient normally used for game;
     we want our own sky gradient to fill the viewport. */
  body:has(#menu-screen:not([hidden])){
    background:none;
    padding:0;
    align-items:stretch;
  }

  #menu-screen{
    position:relative;
    min-height:100dvh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    /* stepped dusk sky gradient */
    background:linear-gradient(180deg,#2a2050 0%,#46285c 20%,#864063 38%,#c8682f 56%,#e0a44e 72%,#cf9648 100%);
  }

  /* stars layer */
  #ms-stars{position:absolute;inset:0;pointer-events:none;z-index:0;}

  /* sun – top LEFT */
  #ms-sun{
    position:absolute;top:12%;left:11%;
    width:clamp(70px,11vw,110px);height:clamp(70px,11vw,110px);
    border-radius:50%;
    background:radial-gradient(circle,#fff1c8 0%,#ffd277 48%,#f4a942 70%,rgba(244,162,58,0) 72%);
    filter:drop-shadow(0 0 38px rgba(255,190,90,.55));
    z-index:1;pointer-events:none;
  }

  /* vignette */
  #ms-vig{
    position:absolute;inset:0;
    background:radial-gradient(125% 90% at 50% 22%, transparent 50%, rgba(20,8,30,.5));
    z-index:2;pointer-events:none;
  }

  /* desert scenery SVG */
  #ms-scenery{
    position:absolute;left:0;bottom:0;width:100%;height:60%;
    z-index:1;pointer-events:none;
  }

  /* Lemons Gaming badge – top RIGHT, prominently enlarged */
  /* Lemons Gaming logo — same form/size/animation as the syllabus site */
  #ms-brand{
    position:absolute;top:16px;right:16px;z-index:10;
    display:flex;align-items:center;gap:12px;text-decoration:none;
  }
  #ms-brand img{
    width:72px;height:72px;border-radius:14px;border:3px solid #1a1a1a;
    object-fit:cover;background:#1a1a1a;box-shadow:4px 4px 0 #ffd23f;
    display:block;transform-origin:center;
    animation:lg-wiggle 5s ease-in-out infinite;
  }
  #ms-brand:hover img,#ms-brand:focus-visible img{
    animation-play-state:paused;transform:rotate(-4deg) scale(1.05);
  }
  #ms-brand .lg-name{
    font-family:'Bungee','Rubik',sans-serif;font-weight:400;font-size:30px;letter-spacing:2px;
    color:#ffd23f;text-shadow:3px 3px 0 #1a1a1a;line-height:1;
  }
  @keyframes lg-wiggle{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
  @media (max-width:720px){
    #ms-brand img{width:54px;height:54px;border-radius:12px;box-shadow:3px 3px 0 #ffd23f}
    #ms-brand .lg-name{font-size:20px;letter-spacing:1.4px;text-shadow:2px 2px 0 #1a1a1a}
  }
  @media (max-width:480px){ #ms-brand .lg-name{display:none} }
  @media (prefers-reduced-motion:reduce){ #ms-brand img{animation:none} }

  /* title block – centered */
  #ms-logo{
    position:absolute;
    left:50%;top:16%;
    transform:translateX(-50%);
    text-align:center;
    width:90%;
    z-index:4;
    pointer-events:none;
  }
  #ms-logo h1{
    font-family:var(--display);
    font-size:clamp(28px,7vw,54px);
    color:#fff3d6;
    line-height:.95;
    text-shadow:0 2px 0 #7a3b16,0 4px 0 #5c2a10,0 8px 16px rgba(0,0,0,.5);
    margin:0;
  }
  #ms-logo .ms-sub{
    margin-top:8px;
    font-family:var(--display);
    font-size:clamp(15px,3.4vw,26px);
    color:#fff0d6;
    text-shadow:0 2px 4px rgba(0,0,0,.55);
  }
  #ms-logo .ms-sub b{color:#ffd23f;}

  /* book shelf */
  #ms-shelf{
    position:absolute;
    left:0;right:0;
    bottom:5%;
    z-index:5;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:1.2%;
    padding:0 3%;
    flex-wrap:wrap;
  }
  .ms-book{
    flex:1;
    min-width:80px;
    max-width:17%;
    cursor:pointer;
    transition:transform .16s ease, filter .16s;
    text-align:center;
    filter:drop-shadow(0 9px 12px rgba(0,0,0,.5));
    border:none;background:transparent;padding:0;
  }
  .ms-book:hover{transform:translateY(-10px) rotate(-1deg);filter:drop-shadow(0 15px 16px rgba(0,0,0,.55)) brightness(1.08);}
  .ms-book:focus-visible{outline:3px solid #ffd23f;outline-offset:3px;border-radius:4px;}
  .ms-book svg{width:100%;height:auto;display:block;}
  .ms-book .ms-bk{
    font-family:var(--display);
    font-size:clamp(12px,2.4vw,20px);
    color:#fff3d6;
    text-shadow:0 2px 3px rgba(0,0,0,.6);
    margin-top:6px;
  }
  .ms-book .ms-n{
    font-weight:800;
    font-size:clamp(9px,1.5vw,12px);
    color:#f0d29a;
    text-shadow:0 1px 2px rgba(0,0,0,.5);
    margin-top:1px;
  }

  /* ---------- header ---------- */
  header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:14px;
    margin-bottom:14px;
  }
  .title h1{
    font-family:var(--display);
    font-size:clamp(30px,9vw,44px);
    line-height:.95;
    margin:0;
    letter-spacing:.5px;
    color:#3a2a16;
    text-shadow:0 1px 0 rgba(255,255,255,.3);
  }
  .title .num{ color:#7a5733; }
  .title p{
    margin:6px 2px 0;
    font-size:clamp(12px,3.4vw,14px);
    color:var(--ink-soft);
    font-weight:500;
  }

  .scores{ display:flex; flex-direction:column; align-items:stretch; gap:8px; }
  .score-row{ display:flex; gap:8px; }
  .box{
    background:#7a5733;
    color:#fbe6cf;
    border-radius:10px;
    padding:7px 14px;
    text-align:center;
    min-width:72px;
    box-shadow:inset 0 2px 3px rgba(255,255,255,.15), inset 0 -2px 4px rgba(0,0,0,.3);
  }
  .box .lbl{
    font-size:10px; font-weight:700; letter-spacing:1px;
    text-transform:uppercase; color:#fbe6cf; opacity:.85;
  }
  .box .val{ font-size:20px; font-weight:800; font-variant-numeric:tabular-nums; }
  .btn{
    font-family:var(--sans);
    font-weight:700;
    font-size:14px;
    color:#fbe6cf;
    background:#7a5733;
    border:none;
    border-radius:10px;
    padding:9px 12px;
    cursor:pointer;
    transition:filter .15s, transform .05s;
    box-shadow:inset 0 2px 3px rgba(255,255,255,.15), inset 0 -2px 4px rgba(0,0,0,.3);
  }
  .btn:hover{ filter:brightness(1.07); }
  .btn:active{ transform:translateY(1px); }
  .btn:focus-visible{ outline:3px solid #e2b873; outline-offset:2px; }

  /* ---------- goal strip ---------- */
  .goal{
    display:flex; align-items:center; gap:8px;
    font-size:13px; color:#5a4326;
    margin:0 2px 12px; font-weight:500;
  }
  .goal b{ color:#3a2a16; font-weight:700; }
  .goal .dot{ width:13px; height:13px; border-radius:4px;
    background:#23264e; box-shadow:0 0 0 2px rgba(244,205,126,.6); display:inline-block; }

  /* ---------- board ---------- */
  .board{
    position:relative;
    width:var(--size);
    height:var(--size);
    background:#8a653c;
    border-radius:16px;
    padding:var(--gap);
    box-shadow:
      0 18px 40px -20px rgba(58,40,12,.55),
      inset 0 3px 12px rgba(0,0,0,.45);
    touch-action:none;
    direction:ltr; /* keep grid math LTR; tile text stays Hebrew */
    user-select:none;
  }
  .cells{
    position:absolute; inset:var(--gap);
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:repeat(4,1fr);
    gap:var(--gap);
  }
  .cell{ background:#9c7448; border-radius:11px; box-shadow:inset 0 2px 5px rgba(0,0,0,.35); }

  .tile{
    position:absolute;
    top:var(--gap); left:var(--gap);
    width:var(--cell); height:var(--cell);
    border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--serif);
    font-weight:900;
    line-height:1;
    text-align:center;
    white-space:nowrap;
    padding:2px;
    transition:transform var(--slide) cubic-bezier(.3,.8,.4,1);
    will-change:transform;
    box-shadow:inset 0 2px 3px rgba(255,255,255,.25), inset 0 -3px 5px rgba(0,0,0,.35), 0 2px 4px rgba(0,0,0,.3);
    direction:rtl;
  }
  .tile.glow{
    box-shadow:0 0 0 2px rgba(244,205,126,.7), 0 0 22px 2px rgba(244,205,126,.5),
      inset 0 1px 0 rgba(255,255,255,.2);
  }
  .tile-new{ animation:pop .2s ease; }
  .tile-merged{ animation:bump .2s ease; }
  @keyframes pop{ 0%{ transform:scale(.1) translate(var(--tx),var(--ty)); } 100%{ transform:scale(1) translate(var(--tx),var(--ty)); } }
  @keyframes bump{ 0%{ } 40%{ } 60%{ filter:brightness(1.18); } 100%{ } }
  .tile.bumpscale{ animation:bumpscale .2s ease; }
  @keyframes bumpscale{
    0%{ transform:scale(1) translate(var(--tx),var(--ty)); }
    50%{ transform:scale(1.14) translate(var(--tx),var(--ty)); }
    100%{ transform:scale(1) translate(var(--tx),var(--ty)); }
  }

  /* ---------- ladder ---------- */
  .ladder-head{
    display:flex; justify-content:space-between; align-items:center;
    margin:18px 2px 8px;
  }
  .ladder-head h2{
    font-family:var(--display); font-size:16px; margin:0; color:#3a2a16;
  }
  .ladder-head span{ font-size:11.5px; color:var(--ink-soft); }
  .ladder{
    display:flex; flex-wrap:wrap; gap:6px;
  }
  .chip{
    display:flex; align-items:center; gap:6px;
    border-radius:8px; padding:5px 9px;
    font-family:var(--serif); font-weight:700; font-size:13px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.15);
  }
  .chip .ord{
    font-family:var(--sans); font-size:9px; font-weight:800;
    opacity:.7; font-variant-numeric:tabular-nums;
  }

  .hint{
    margin-top:16px; text-align:center;
    font-size:12.5px; color:var(--ink-soft);
  }

  /* ---------- overlay ---------- */
  .board-stage{ position:relative; }
  .overlay{
    position:absolute; inset:0;
    display:none;
    flex-direction:column; align-items:center; justify-content:center;
    gap:14px;
    border-radius:16px;
    backdrop-filter:blur(2px);
    background:rgba(154,111,67,.92);
    color:#fbe6cf;
    text-align:center; padding:24px;
    direction:rtl;
    animation:fade .25s ease;
  }
  .overlay.show{ display:flex; }
  .overlay.win{ background:rgba(58,42,22,.93); color:#fbe6cf; }
  .overlay h3{ font-family:var(--display); font-size:30px; margin:0; color:#fbe6cf; }
  .overlay.win h3{ color:#f4cd7e; }
  .overlay p{ margin:0; font-size:14px; max-width:80%; opacity:.9; }
  .overlay .row{ display:flex; gap:10px; }
  .overlay.win .btn{ background:#caa256; color:#3a2a16; }
  @keyframes fade{ from{ opacity:0; } to{ opacity:1; } }

  @media (prefers-reduced-motion: reduce){
    .tile{ transition:none; }
    .tile-new,.tile-merged,.bumpscale,.overlay{ animation:none !important; }
  }
</style>
</head>
<body>

  <!-- MENU SCREEN — desert title screen -->
  <div id="menu-screen">
    <!-- stars -->
    <div id="ms-stars"></div>
    <!-- sun (top-left) -->
    <div id="ms-sun"></div>
    <!-- desert scenery SVG (dunes, camels, palms, ripples) -->
    <svg id="ms-scenery" viewBox="0 0 980 372" preserveAspectRatio="none"></svg>
    <!-- vignette -->
    <div id="ms-vig"></div>
    <!-- Lemons Gaming logo badge (top-right) -->
    <a id="ms-brand" href="https://lemons-gaming.github.io/" target="_blank" rel="noopener noreferrer" aria-label="Lemons Gaming"><img src="lemons-logo.jpg" alt="Lemons Gaming"><span class="lg-name">LEMONS GAMING</span></a>
    <!-- title -->
    <div id="ms-logo"><h1>פרשות השבוע</h1><div class="ms-sub">בסגנון <b>2048</b></div></div>
    <!-- book shelf (populated by JS) -->
    <div id="ms-shelf"></div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" hidden>
    <div class="wrap">
      <header>
        <div class="title">
          <h1 id="book-title"><span id="book-name">במדבר</span> <span class="num">2048</span></h1>
          <p><span id="goal-text"></span></p>
        </div>
        <div class="scores">
          <div class="score-row">
            <div class="box"><div class="lbl">ניקוד</div><div class="val" id="score">0</div></div>
            <div class="box"><div class="lbl">שיא</div><div class="val" id="best">0</div></div>
          </div>
          <div class="score-row">
            <button class="btn" id="new-game">משחק חדש</button>
            <button class="btn" id="to-menu">← לחומשים</button>
          </div>
        </div>
      </header>

      <div class="goal">
        <span class="dot"></span>
        <span id="goal-strip-text">המטרה: להגיע אל הפרשה האחרונה.</span>
      </div>

      <div class="board-stage">
        <div class="board" id="board">
          <div class="cells" id="cells"></div>
        </div>

        <div class="overlay" id="overlay-lose">
          <h3>נגמרו המהלכים</h3>
          <p>הלוח התמלא. נסו שוב מההתחלה.</p>
          <button class="btn" data-restart>מסע חדש</button>
        </div>

        <div class="overlay win" id="overlay-win">
          <h3>השלמתם את הספר!</h3>
          <p>אפשר להמשיך ולאחד פרשות נוספות.</p>
          <div class="row">
            <button class="btn" id="keep-playing">המשך לשחק</button>
            <button class="btn" data-restart>התחל מחדש</button>
          </div>
        </div>
      </div>

      <div class="ladder-head">
        <h2>סדר הפרשות</h2>
        <span>כל שתי פרשות זהות מתאחדות לבאה אחריה</span>
      </div>
      <div class="ladder" id="ladder"></div>

      <p class="hint" id="hint">החליקו לכל כיוון כדי להזיז · במחשב: מקשי החיצים</p>
    </div>
  </div>

<script>
(function(){
  "use strict";

  // ---------- books data ----------
  const BOOKS = [
    { id:'genesis', name:'בראשית', accent:'#28ad5e',
      ramp:['#f0eaa8','#d2e07a','#a6d44f','#5fc04a','#28ad5e','#119b7a','#0e8a86','#0d7480','#125f72','#184a5e','#1d3848','#11242e'],
      parashot:['בראשית','נח','לך לך','וירא','חיי שרה','תולדות','ויצא','וישלח','וישב','מקץ','ויגש','ויחי'] },
    { id:'exodus', name:'שמות', accent:'#1f86cf',
      ramp:['#d9ecf2','#aad9ec','#6ec3e6','#3aa6de','#1f86cf','#1769bf','#1450a6','#143f88','#15316a','#172650','#121a38'],
      parashot:['שמות','וארא','בא','בשלח','יתרו','משפטים','תרומה','תצוה','כי תשא','ויקהל','פקודי'] },
    { id:'leviticus', name:'ויקרא', accent:'#dd5a26',
      ramp:['#f6e7a8','#f4cd6a','#efa83f','#e8822c','#dd5a26','#cc3a2a','#b32432','#971a3a','#741533','#4d0f24'],
      parashot:['ויקרא','צו','שמיני','תזריע','מצורע','אחרי מות','קדושים','אמור','בהר','בחקתי'] },
    { id:'numbers', name:'במדבר', accent:'#c4632e',
      ramp:['#ecd9a0','#e0b95e','#d18f3a','#c4632e','#a83f3e','#823a63','#5a3a7e','#3b3470','#272a55','#171b38'],
      parashot:['במדבר','נשא','בהעלותך','שלח','קרח','חקת','בלק','פינחס','מטות','מסעי'] },
    { id:'deut', name:'דברים', accent:'#9536b3',
      ramp:['#ead9f0','#d3a9e6','#bd7ddb','#a854c9','#9536b3','#7e2a9c','#662586','#4f1f6e','#3a1a54','#27143b','#180c27'],
      parashot:['דברים','ואתחנן','עקב','ראה','שופטים','כי תצא','כי תבוא','נצבים','וילך','האזינו','וזאת הברכה'] },
  ];

  // ---------- color helpers ----------
  function hex2rgb(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
  function luminance(hex){const [r,g,b]=hex2rgb(hex);return (0.299*r+0.587*g+0.114*b)/255;}
  function fgFor(bg,isDest){return isDest?'#f4cd7e':(luminance(bg)<0.56?'#fff':'#2a2410');}
  function bookColors(book){return book.ramp;}

  // ---------- module-level engine state (set per book by startBook) ----------
  let ORDER, NAME, COLORS, MAX;

  // ---------- DOM refs ----------
  const board   = document.getElementById('board');
  const cellsEl = document.getElementById('cells');
  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best');
  const overlayWin  = document.getElementById('overlay-win');
  const overlayLose = document.getElementById('overlay-lose');

  // background wells (created once)
  for(let i=0;i<16;i++){ const c=document.createElement('div'); c.className='cell'; cellsEl.appendChild(c); }

  // ---------- per-book logic ----------
  let currentBook = null;

  function deriveBook(book){
    const ps = book.parashot, cols = bookColors(book);
    ORDER = ps.map((_,i)=>Math.pow(2,i+1));      // [2,4,8,...]
    MAX   = ORDER[ORDER.length-1];
    NAME = {}; COLORS = {};
    ORDER.forEach((v,i)=>{ NAME[v]=ps[i]; COLORS[v]={bg:cols[i], fg:fgFor(cols[i], i===ps.length-1)}; });
  }

  function buildLadder(){
    const L = document.getElementById('ladder'); L.innerHTML='';
    ORDER.forEach((v,i)=>{
      const c=COLORS[v]; const chip=document.createElement('div');
      chip.className='chip'; chip.style.background=c.bg; chip.style.color=c.fg;
      chip.innerHTML='<span class="ord">'+(i+1)+'</span>'+NAME[v];
      L.appendChild(chip);
    });
  }

  function bestKey(){ return 'torah2048-best-'+currentBook.id; }
  function loadBest(){ try{ best = parseInt(localStorage.getItem(bestKey())||'0',10)||0; }catch(e){ best=0; } bestEl.textContent=best; }
  function saveBest(){ try{ localStorage.setItem(bestKey(), String(best)); }catch(e){} }

  function startBook(book){
    currentBook = book;
    deriveBook(book);
    document.getElementById('book-name').textContent = book.name;
    document.getElementById('goal-text').textContent = 'המטרה: להגיע אל '+book.parashot[book.parashot.length-1]+' — סיום ספר '+book.name+'.';
    document.getElementById('goal-strip-text').textContent = 'המטרה: להגיע אל '+book.parashot[book.parashot.length-1]+' — סיום ספר '+book.name+'.';
    document.querySelector('.goal .dot').style.background = book.accent;
    buildLadder();
    loadBest();
    document.getElementById('menu-screen').hidden = true;
    document.getElementById('game-screen').hidden = false;
    reset();           // engine reset: clears tiles, spawns 2, renders
  }

  function backToMenu(){
    document.getElementById('game-screen').hidden = true;
    document.getElementById('menu-screen').hidden = false;
  }

  // ---------- aged/faded menu-only book colors (DOES NOT touch BOOKS[i].ramp or .accent) ----------
  const MENU_AGED = {
    genesis:   '#7d8a52',  // dusty olive-green
    exodus:    '#5c7a91',  // faded slate-blue
    leviticus: '#a85a44',  // faded brick-red
    numbers:   '#b0894e',  // aged ochre
    deut:      '#856086',  // dusty plum
  };

  // shade helper for SVG gradients
  function menuShade(hex,amt){
    const cl=v=>Math.max(0,Math.min(255,Math.round(v)));
    const r=parseInt(hex.slice(1,3),16)+amt, g=parseInt(hex.slice(3,5),16)+amt, b=parseInt(hex.slice(5,7),16)+amt;
    return '#'+[cl(r),cl(g),cl(b)].map(v=>v.toString(16).padStart(2,'0')).join('');
  }

  function bookSVG(c, idx){
    const light=menuShade(c,22), dark=menuShade(c,-30), spine=menuShade(c,-52);
    const gold='#c2a25c', goldL='#d8bd7c', page='#e7dcc0', pageSh='#c9bb95';
    return `<svg viewBox="0 0 120 156" aria-hidden="true">
      <defs><linearGradient id="mscov${idx}" x1="0" y1="0" x2="0.85" y2="1">
        <stop offset="0" stop-color="${light}"/><stop offset="1" stop-color="${dark}"/></linearGradient></defs>
      <ellipse cx="58" cy="150" rx="46" ry="6.5" fill="rgba(0,0,0,.30)"/>
      <rect x="16" y="16" width="80" height="126" rx="3" fill="${page}"/>
      <g stroke="${pageSh}" stroke-width="1.3">
        <line x1="18" y1="30" x2="22" y2="30"/><line x1="18" y1="48" x2="22" y2="48"/><line x1="18" y1="66" x2="22" y2="66"/>
        <line x1="18" y1="84" x2="22" y2="84"/><line x1="18" y1="102" x2="22" y2="102"/><line x1="18" y1="120" x2="22" y2="120"/></g>
      <path d="M40 8 L52 8 L52 34 L46 28 L40 34 Z" fill="${gold}"/>
      <rect x="22" y="10" width="74" height="132" rx="6" fill="url(#mscov${idx})" stroke="${spine}" stroke-width="2"/>
      <rect x="24" y="104" width="70" height="36" rx="5" fill="rgba(0,0,0,.14)"/>
      <rect x="27" y="14" width="8" height="124" rx="4" fill="rgba(255,255,255,.10)"/>
      <circle cx="46" cy="120" r="6" fill="rgba(0,0,0,.07)"/><circle cx="70" cy="40" r="5" fill="rgba(255,255,255,.06)"/>
      <rect x="88" y="10" width="11" height="132" rx="3" fill="${spine}"/>
      <g stroke="${gold}" stroke-width="2" opacity=".8">
        <line x1="89" y1="34" x2="99" y2="34"/><line x1="89" y1="76" x2="99" y2="76"/><line x1="89" y1="118" x2="99" y2="118"/></g>
      <rect x="32" y="24" width="50" height="104" rx="4" fill="none" stroke="${gold}" stroke-width="1.6" opacity=".8"/>
      <circle cx="57" cy="76" r="15" fill="none" stroke="${goldL}" stroke-width="1.6" opacity=".85"/>
      <path d="M57 64 L67 76 L57 88 L47 76 Z" fill="${gold}" opacity=".9"/>
    </svg>`;
  }

  // ---------- render desert title screen ----------
  (function renderMenu(){
    // --- stars ---
    let s='';
    for(let i=0;i<48;i++){
      const x=(i*73+((i*i)%37)*5+9)%980, y=(i*29+((i*i*i)%23)*2+4)%150, r=(i%6===0)?1.8:1;
      s+=`<circle cx="${x}" cy="${y}" r="${r}" fill="#fff" opacity="${(0.4+(i%6)/10).toFixed(2)}"/>`;
    }
    document.getElementById('ms-stars').innerHTML=
      `<svg width="100%" height="100%" viewBox="0 0 980 620" preserveAspectRatio="none">${s}</svg>`;

    // --- desert scenery SVG ---
    const SC=[];
    const sand1='#c79a5a', sand2='#a9763f', sand3='#86592e', sand4='#5e3d22', darkSil='#3c2614';
    SC.push(`<path d="M0 120 Q200 64 440 104 T980 84 V372 H0 Z" fill="${sand1}"/>`);
    SC.push(`<path d="M0 180 Q260 120 560 164 T980 150 V372 H0 Z" fill="${sand2}"/>`);
    SC.push(`<path d="M0 250 Q240 200 540 232 T980 224 V372 H0 Z" fill="${sand3}"/>`);
    SC.push(`<path d="M0 320 Q300 290 620 312 T980 306 V372 H0 Z" fill="${sand4}"/>`);
    SC.push(`<g stroke="rgba(60,38,20,.25)" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M120 210 q60 -10 120 0"/><path d="M360 230 q70 -12 150 2"/><path d="M640 222 q60 -10 130 0"/>
      <path d="M200 280 q80 -12 160 2"/><path d="M520 290 q70 -10 150 0"/></g>`);
    function camel(x,y,sc){return `<g transform="translate(${x},${y}) scale(${sc})" fill="${darkSil}">
      <ellipse cx="16" cy="10" rx="13" ry="6"/><ellipse cx="11" cy="5" rx="5" ry="5"/><ellipse cx="20" cy="5" rx="5" ry="5"/>
      <path d="M27 9 q6 -2 7 -10 l2 1 q0 9 -6 13 Z"/><circle cx="35" cy="-2" r="3"/>
      <rect x="7" y="14" width="2.4" height="11"/><rect x="13" y="14" width="2.4" height="11"/>
      <rect x="20" y="14" width="2.4" height="11"/><rect x="26" y="14" width="2.4" height="11"/></g>`;}
    SC.push(`<g opacity=".85">${camel(620,196,0.9)}${camel(672,200,0.78)}${camel(716,203,0.62)}</g>`);
    function palm(x,baseY,sc){return `<g transform="translate(${x},${baseY}) scale(${sc})" fill="${darkSil}">
      <path d="M-3 0 q-2 -34 4 -64 q2 30 4 64 Z"/>
      <g transform="translate(2,-62)">
        <path d="M0 0 q-34 -6 -52 8 q26 -22 52 -2 Z"/><path d="M0 0 q34 -6 52 8 q-26 -22 -52 -2 Z"/>
        <path d="M0 0 q-22 -26 -44 -28 q24 -2 44 22 Z"/><path d="M0 0 q22 -26 44 -28 q-24 -2 -44 22 Z"/>
        <path d="M0 0 q-6 -34 4 -50 q4 26 -4 50 Z"/></g></g>`;}
    SC.push(palm(168,300,1.05));
    SC.push(palm(95,316,0.7));
    document.getElementById('ms-scenery').innerHTML = SC.join('');

    // --- book shelf wired to startBook ---
    const shelf = document.getElementById('ms-shelf');
    BOOKS.forEach((b, i)=>{
      const aged = MENU_AGED[b.id] || b.accent;
      const btn = document.createElement('button');
      btn.className = 'ms-book';
      btn.setAttribute('aria-label', 'שחק ב' + b.name);
      btn.innerHTML =
        bookSVG(aged, i) +
        '<div class="ms-bk">' + b.name + '</div>' +
        '<div class="ms-n">' + b.parashot.length + ' פרשות</div>';
      btn.addEventListener('click', ()=>startBook(BOOKS[i]));
      shelf.appendChild(btn);
    });
  })();

  document.getElementById('to-menu').addEventListener('click', backToMenu);

  // ---------- game state ----------
  let grid;            // 4x4 of tile | null
  let allTiles;        // active tiles
  let removedTiles;    // tiles sliding out after a merge
  const tileEls = {};  // id -> DOM element
  let nextId = 1;
  let score = 0, best = 0;
  let wonShown = false;
  let inputLocked = false;

  // ---------- helpers ----------
  const inB = (r,c)=> r>=0 && r<4 && c>=0 && c<4;

  function emptyCells(){
    const out=[];
    for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(!grid[r][c]) out.push({r,c});
    return out;
  }

  function spawn(){
    const empty = emptyCells();
    if(!empty.length) return;
    const {r,c} = empty[Math.floor(Math.random()*empty.length)];
    const value = Math.random()<0.9 ? 2 : 4;
    const t = {id:nextId++, value, row:r, col:c, isNew:true};
    grid[r][c]=t; allTiles.push(t);
  }

  function vector(dir){
    return {up:{r:-1,c:0}, down:{r:1,c:0}, left:{r:0,c:-1}, right:{r:0,c:1}}[dir];
  }
  function traversals(v){
    const r=[0,1,2,3], c=[0,1,2,3];
    if(v.r===1) r.reverse();
    if(v.c===1) c.reverse();
    return {r,c};
  }
  function farthest(row,col,v){
    let prev, cur={r:row,c:col};
    do{ prev=cur; cur={r:prev.r+v.r, c:prev.c+v.c}; }
    while(inB(cur.r,cur.c) && !grid[cur.r][cur.c]);
    return {far:prev, next:cur};
  }

  function cleanupRemoved(){
    for(const t of removedTiles){
      const el=tileEls[t.id];
      if(el){ el.remove(); delete tileEls[t.id]; }
    }
    removedTiles=[];
  }

  // ---------- core move ----------
  function applyMove(dir){
    cleanupRemoved();
    const v = vector(dir);
    const trav = traversals(v);
    let moved = false;
    let justWon = false;

    for(const t of allTiles){ t.merged=false; }

    trav.r.forEach(row=>{
      trav.c.forEach(col=>{
        const tile = grid[row][col];
        if(!tile) return;
        const {far, next} = farthest(row,col,v);
        const target = inB(next.r,next.c) ? grid[next.r][next.c] : null;

        if(target && target.value===tile.value && target.value<MAX && !target.merged){
          // merge tile -> target
          grid[row][col]=null;
          target.value *= 2;
          target.merged = true;
          target.justMerged = true;
          score += target.value;
          if(target.value===MAX) justWon = true;
          // slide source into target then remove
          tile.row=target.row; tile.col=target.col; tile.removed=true;
          removedTiles.push(tile);
          allTiles = allTiles.filter(x=>x!==tile);
          moved = true;
        } else if(far.r!==row || far.c!==col){
          grid[row][col]=null;
          grid[far.r][far.c]=tile;
          tile.row=far.r; tile.col=far.c;
          moved = true;
        }
      });
    });

    return {moved, justWon};
  }

  function movesAvailable(){
    if(emptyCells().length) return true;
    for(let r=0;r<4;r++) for(let c=0;c<4;c++){
      const t=grid[r][c]; if(!t || t.value>=MAX) continue;
      const right=grid[r][c+1], down=grid[r+1]?.[c];
      if((right && right.value===t.value) || (down && down.value===t.value)) return true;
    }
    return false;
  }

  // ---------- rendering ----------
  function setVisual(el,t){
    const c = COLORS[t.value];
    el.style.background = c.bg;
    el.style.color = c.fg;
    el.textContent = NAME[t.value] || t.value;
    el.classList.toggle('glow', t.value===MAX);
  }
  function setPos(el,t){
    const tx = `calc(${t.col} * var(--stride))`;
    const ty = `calc(${t.row} * var(--stride))`;
    el.style.setProperty('--tx', tx);
    el.style.setProperty('--ty', ty);
    el.style.transform = `translate(${tx}, ${ty})`;
  }

  function render(){
    const list = allTiles.concat(removedTiles);
    for(const t of list){
      let el = tileEls[t.id];
      if(!el){
        el = document.createElement('div');
        el.className='tile';
        tileEls[t.id]=el;
        setVisual(el,t);
        // place without sliding from origin
        el.style.transition='none';
        setPos(el,t);
        el.getBoundingClientRect(); // reflow
        el.style.transition='';
        board.appendChild(el);
        if(t.isNew){ el.classList.add('tile-new'); setTimeout(()=>el.classList.remove('tile-new'),210); t.isNew=false; }
      } else {
        setVisual(el,t);
        setPos(el,t);
        if(t.justMerged){
          el.classList.remove('bumpscale'); void el.offsetWidth;
          el.classList.add('bumpscale');
          setTimeout(()=>el.classList.remove('bumpscale'),210);
          t.justMerged=false;
        }
      }
    }
    fitFonts();
  }

  function fitFonts(){
    const cellEl = cellsEl.querySelector('.cell');
    if(!cellEl) return;
    const size = cellEl.getBoundingClientRect().width;
    for(const id in tileEls){
      const el = tileEls[id];
      const len = [...el.textContent].length || 1;
      const fs = Math.min(size*0.40, (size*0.84)/(len*0.58));
      el.style.fontSize = fs+'px';
    }
  }

  // ---------- flow ----------
  function move(dir){
    if(!currentBook) return;
    if(inputLocked) return;
    const {moved, justWon} = applyMove(dir);
    if(!moved) return;
    render();
    spawn();
    render();
    scoreEl.textContent = score;
    if(score>best){ best=score; bestEl.textContent=best; saveBest(); }

    // remove merged-source tiles after the slide settles
    const settle = [...removedTiles];
    setTimeout(()=>{
      for(const t of settle){ const el=tileEls[t.id]; if(el){ el.remove(); delete tileEls[t.id]; } }
      removedTiles = removedTiles.filter(t=>!settle.includes(t));
    }, 170);

    if(justWon && !wonShown){ wonShown=true; inputLocked=true; overlayWin.classList.add('show'); }
    else if(!movesAvailable()){ inputLocked=true; overlayLose.classList.add('show'); }
  }

  function reset(){
    grid = [[null,null,null,null],[null,null,null,null],[null,null,null,null],[null,null,null,null]];
    allTiles=[]; removedTiles=[];
    for(const id in tileEls){ tileEls[id].remove(); delete tileEls[id]; }
    score=0; scoreEl.textContent='0';
    wonShown=false; inputLocked=false;
    overlayWin.classList.remove('show');
    overlayLose.classList.remove('show');
    spawn(); spawn();
    render();
  }

  // ---------- input: keyboard ----------
  const KEYS = {
    ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
    w:'up', s:'down', a:'left', d:'right', W:'up', S:'down', A:'left', D:'right'
  };
  window.addEventListener('keydown', e=>{
    const dir = KEYS[e.key];
    if(dir){ e.preventDefault(); move(dir); }
  }, {passive:false});

  // ---------- input: touch / swipe ----------
  let sx=0, sy=0, tracking=false;
  board.addEventListener('touchstart', e=>{
    const t=e.changedTouches[0]; sx=t.clientX; sy=t.clientY; tracking=true;
  }, {passive:true});
  board.addEventListener('touchmove', e=>{ if(tracking) e.preventDefault(); }, {passive:false});
  board.addEventListener('touchend', e=>{
    if(!tracking) return; tracking=false;
    const t=e.changedTouches[0];
    handleSwipe(t.clientX-sx, t.clientY-sy);
  }, {passive:true});

  // pointer (mouse drag / trackpad) as a bonus on desktop
  board.addEventListener('pointerdown', e=>{
    if(e.pointerType==='touch') return;
    sx=e.clientX; sy=e.clientY; tracking=true;
  });
  window.addEventListener('pointerup', e=>{
    if(!tracking || e.pointerType==='touch') return; tracking=false;
    handleSwipe(e.clientX-sx, e.clientY-sy);
  });

  function handleSwipe(dx,dy){
    const ax=Math.abs(dx), ay=Math.abs(dy);
    if(Math.max(ax,ay)<24) return; // ignore taps
    if(ax>ay) move(dx>0 ? 'right' : 'left');
    else      move(dy>0 ? 'down'  : 'up');
  }

  // ---------- buttons ----------
  document.getElementById('new-game').addEventListener('click', reset);
  document.getElementById('keep-playing').addEventListener('click', ()=>{
    overlayWin.classList.remove('show'); inputLocked=false;
  });
  document.querySelectorAll('[data-restart]').forEach(b=> b.addEventListener('click', reset));

  window.addEventListener('resize', fitFonts);
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(fitFonts);

  // Game starts on menu — no auto-start

})();
</script>
</body>
